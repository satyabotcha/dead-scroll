<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Social Media Feed Remover</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Feed Remover</h1>
      <label class="setting">
        <span>
          <strong>Focus Mode</strong>
          <small>Hide YouTube feeds and Shorts.</small>
        </span>
        <input id="focus-mode" type="checkbox" role="switch">
        <span class="switch" aria-hidden="true"></span>
      </label>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
