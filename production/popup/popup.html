<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Monk Mode</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Monk Mode</h1>
      <label class="setting">
        <span>
          <strong>Focus</strong>
        </span>
        <input id="focus-mode" type="checkbox" role="switch">
        <span class="switch" aria-hidden="true"></span>
      </label>
      <div class="preview-section">
        <div class="preview-header">
          <strong>Preview days</strong>
          <span id="preview-count">0</span>
        </div>
        <input id="preview-days" type="range" min="0" max="365" value="0">
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
