<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Focus Space Art</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #02050b;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #02050b;
    }
  </style>
</head>
<body>
  <canvas id="space"></canvas>

  <script>
    const canvas = document.getElementById("space");
    const ctx = canvas.getContext("2d", { alpha: false });

    const constellations = [
      [[0.10, 0.35], [0.14, 0.30], [0.16, 0.26], [0.18, 0.28], [0.22, 0.35], [0.24, 0.46]],
      [[0.08, 0.86], [0.14, 0.91], [0.17, 0.80], [0.21, 0.89], [0.15, 0.94]],
      [[0.38, 0.32], [0.41, 0.15], [0.49, 0.18], [0.44, 0.28], [0.39, 0.22], [0.36, 0.37]],
      [[0.64, 0.05], [0.70, 0.10], [0.67, 0.19], [0.66, 0.27], [0.63, 0.12], [0.62, 0.26]],
      [[0.42, 0.60], [0.44, 0.57], [0.45, 0.64], [0.42, 0.67], [0.40, 0.63]],
      [[0.82, 0.88], [0.85, 0.80], [0.90, 0.80], [0.94, 0.83], [0.92, 0.70], [0.86, 0.71]],
      [[0.91, 0.48], [0.94, 0.44], [0.96, 0.58], [0.94, 0.69], [0.91, 0.65]],
      [[0.47, 0.75], [0.52, 0.89], [0.57, 0.92], [0.54, 0.96], [0.48, 0.90]]
    ];

    const meteors = [
      [0.290, 0.150, 0.225, 0.086, 2.6],
      [0.302, 0.865, 0.227, 0.765, 3.0],
      [0.718, 0.785, 0.780, 0.710, 2.8],
      [0.280, 0.610, 0.237, 0.565, 1.7]
    ];

    function makeRandom(seed) {
      let state = seed >>> 0;
      return function rand() {
        state += 0x6d2b79f5;
        let t = state;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function createRenderer(seed) {
      const rand = makeRandom(seed);
      let spare = null;

      function random(min = 1, max) {
        if (max === undefined) return rand() * min;
        return min + rand() * (max - min);
      }

      function gaussian(mean = 0, sd = 1) {
        if (spare !== null) {
          const value = spare;
          spare = null;
          return mean + value * sd;
        }

        let u = 0;
        let v = 0;
        while (u === 0) u = rand();
        while (v === 0) v = rand();
        const mag = Math.sqrt(-2 * Math.log(u));
        spare = mag * Math.sin(2 * Math.PI * v);
        return mean + mag * Math.cos(2 * Math.PI * v) * sd;
      }

      return { random, gaussian };
    }

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      render();
    }

    function render() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      const r = createRenderer(95092026);

      drawBackground(ctx, width, height);
      drawNebulae(ctx, width, height, r);
      drawStars(ctx, width, height, r);
      drawConstellations(ctx, width, height);
      drawMeteors(ctx, width, height);
      drawBlackHole(ctx, width, height, r);
      drawFineGrain(ctx, width, height, r);
      drawVignette(ctx, width, height);
    }

    function drawBackground(target, width, height) {
      const sky = target.createLinearGradient(0, 0, 0, height);
      sky.addColorStop(0, "#040914");
      sky.addColorStop(0.45, "#071321");
      sky.addColorStop(1, "#01050b");
      target.fillStyle = sky;
      target.fillRect(0, 0, width, height);

      glow(target, width * 0.23, height * 0.58, width * 0.62, [18, 70, 102], 0.28);
      glow(target, width * 0.72, height * 0.39, width * 0.47, [74, 88, 124], 0.22);
      glow(target, width * 0.56, height * 0.50, width * 0.36, [32, 58, 78], 0.30);
      glow(target, width * 0.77, height * 0.34, width * 0.25, [180, 126, 92], 0.08);
    }

    function glow(target, x, y, radius, rgb, alpha) {
      target.save();
      target.globalCompositeOperation = "screen";
      const gradient = target.createRadialGradient(x, y, 0, x, y, radius);
      gradient.addColorStop(0, `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha})`);
      gradient.addColorStop(0.46, `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha * 0.16})`);
      gradient.addColorStop(1, `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0)`);
      target.fillStyle = gradient;
      target.fillRect(0, 0, target.canvas.width, target.canvas.height);
      target.restore();
    }

    function drawNebulae(target, width, height, r) {
      const layer = document.createElement("canvas");
      layer.width = width;
      layer.height = height;
      const g = layer.getContext("2d");
      g.globalCompositeOperation = "screen";

      for (let i = 0; i < 9000; i++) {
        const t = r.random(-0.08, 1.08);
        const cx = lerp(width * 0.44, width * 1.00, t);
        const cy = lerp(height * 0.61, height * 0.16, t) + Math.sin(t * 9.2) * height * 0.055;
        const spread = lerp(height * 0.018, height * 0.078, 1 - Math.abs(t - 0.54));
        const x = r.gaussian(cx, width * 0.023);
        const y = r.gaussian(cy, spread);
        const warm = r.random() < 0.34 || (t > 0.45 && t < 0.72 && r.random() < 0.62);
        const alpha = r.random(0.025, 0.19) * (1 - Math.abs(t - 0.55) * 0.54);
        g.fillStyle = warm
          ? `rgba(${r.random(205, 255)}, ${r.random(142, 208)}, ${r.random(96, 158)}, ${alpha})`
          : `rgba(${r.random(82, 150)}, ${r.random(138, 206)}, 255, ${alpha})`;
        disk(g, x, y, r.random(0.6, 3.5));
      }

      for (let i = 0; i < 6200; i++) {
        const t = r.random();
        const cx = lerp(width * 0.00, width * 0.36, t);
        const cy = height * (0.50 + 0.22 * t) + Math.sin(t * 8.4) * height * 0.11;
        const x = r.gaussian(cx, width * 0.03);
        const y = r.gaussian(cy, height * 0.037);
        const alpha = r.random(0.018, 0.13) * (1 - Math.abs(t - 0.48) * 0.5);
        g.fillStyle = `rgba(54, ${r.random(108, 174)}, ${r.random(170, 235)}, ${alpha})`;
        disk(g, x, y, r.random(0.6, 4.2));
      }

      g.filter = "blur(0.5px)";
      for (let i = 0; i < 42; i++) {
        const t = i / 41;
        g.fillStyle = "rgba(120, 182, 230, 0.052)";
        fillEllipse(g, lerp(width * 0.48, width * 0.97, t), lerp(height * 0.58, height * 0.17, t) + Math.sin(t * 8) * 36, width * 0.16 * (1 - t * 0.24), height * 0.030, -0.43);
        g.fillStyle = "rgba(255, 188, 132, 0.032)";
        fillEllipse(g, lerp(width * 0.54, width * 0.92, t), lerp(height * 0.55, height * 0.24, t) + Math.sin(t * 7) * 28, width * 0.11, height * 0.018, -0.42);
      }

      target.save();
      target.globalCompositeOperation = "screen";
      target.drawImage(layer, 0, 0);
      target.restore();
    }

    function drawStars(target, width, height, r) {
      target.save();
      target.globalCompositeOperation = "screen";
      for (let i = 0; i < 6200; i++) {
        const clustered = r.random() < 0.40;
        const x = clustered ? r.gaussian(width * 0.76, width * 0.18) : r.random(width);
        const y = clustered ? r.gaussian(height * 0.38, height * 0.19) : r.random(height);
        if (x < 0 || x > width || y < 0 || y > height) continue;

        const radius = Math.pow(r.random(), 3.15) * 1.95 + 0.22;
        const alpha = r.random(0.16, 0.88);
        const cool = r.random() < 0.58;
        target.fillStyle = cool
          ? `rgba(${r.random(155, 210)}, ${r.random(190, 232)}, 255, ${alpha})`
          : `rgba(255, ${r.random(224, 252)}, ${r.random(205, 240)}, ${alpha})`;
        disk(target, x, y, radius);

        if (radius > 1.45 && r.random() < 0.32) {
          target.strokeStyle = `rgba(160, 205, 255, ${alpha * 0.34})`;
          target.lineWidth = 0.7;
          line(target, x - radius * 3, y, x + radius * 3, y);
          line(target, x, y - radius * 3, x, y + radius * 3);
        }
      }

      for (let i = 0; i < 70; i++) {
        const x = r.random(width);
        const y = r.random(height);
        const radius = r.random(1.6, 3.6);
        const cool = r.random() < 0.7;
        const color = cool ? [185, 222, 255] : [255, 208, 178];
        target.shadowBlur = r.random(8, 20);
        target.shadowColor = `rgba(${color[0]}, ${color[1]}, ${color[2]}, .85)`;
        target.fillStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, ${r.random(0.60, 0.95)})`;
        disk(target, x, y, radius);
        target.shadowBlur = 0;
      }
      target.restore();
    }

    function drawConstellations(target, width, height) {
      target.save();
      target.globalCompositeOperation = "screen";
      target.lineCap = "round";
      for (const group of constellations) {
        target.strokeStyle = "rgba(150, 198, 252, 0.16)";
        target.lineWidth = 1;
        for (let i = 0; i < group.length - 1; i++) {
          line(target, group[i][0] * width, group[i][1] * height, group[i + 1][0] * width, group[i + 1][1] * height);
        }

        for (const point of group) {
          const x = point[0] * width;
          const y = point[1] * height;
          target.fillStyle = "rgba(88, 151, 235, 0.08)";
          disk(target, x, y, 8);
          target.fillStyle = "rgba(230, 246, 255, 0.78)";
          disk(target, x, y, 2.3);
        }
      }
      target.restore();
    }

    function drawMeteors(target, width, height) {
      target.save();
      target.globalCompositeOperation = "screen";
      target.lineCap = "round";
      for (const meteor of meteors) {
        const x1 = meteor[0] * width;
        const y1 = meteor[1] * height;
        const x2 = meteor[2] * width;
        const y2 = meteor[3] * height;
        for (let i = 0; i < 11; i++) {
          const t = i / 10;
          target.strokeStyle = `rgba(100, 168, 255, ${0.16 * (1 - t)})`;
          target.lineWidth = meteor[4] + (1 - t) * 6.5;
          line(target, x1, y1, lerp(x1, x2, t), lerp(y1, y2, t));
        }
        target.strokeStyle = "rgba(255, 241, 221, 0.88)";
        target.lineWidth = meteor[4] * 0.58;
        line(target, x1, y1, x2, y2);
        target.fillStyle = "rgba(255, 245, 229, 0.82)";
        disk(target, x1, y1, meteor[4] * 1.35);
      }
      target.restore();
    }

    function drawBlackHole(target, width, height, r) {
      const layer = document.createElement("canvas");
      layer.width = width;
      layer.height = height;
      const g = layer.getContext("2d");
      const cx = width * 0.586;
      const cy = height * 0.505;
      const core = Math.min(width, height) * 0.086;

      g.save();
      g.translate(cx, cy);
      g.globalCompositeOperation = "screen";

      for (let i = 0; i < 17000; i++) {
        const t = i / 17000;
        const a = t * 70.0 + r.random(-0.16, 0.16);
        const radius = core * r.random(1.02, 3.65) * (1 + Math.sin(t * 52) * 0.035);
        const lens = 1.18 + 0.38 * Math.sin(a * 2.0 + radius * 0.015);
        const x = Math.cos(a) * radius * lens;
        const y = Math.sin(a) * radius * r.random(0.17, 0.45) + Math.sin(a * 3) * core * 0.075;
        const hot = r.random() < 0.43 || (x > 0 && Math.abs(y) < core * 0.35);
        const sideBoost = x > 0 ? 1.25 : 0.82;
        const alpha = r.random(0.035, 0.30) * sideBoost * (1 - Math.min(0.82, t * 0.42));
        g.fillStyle = hot
          ? `rgba(${r.random(222, 255)}, ${r.random(162, 220)}, ${r.random(116, 170)}, ${alpha})`
          : `rgba(${r.random(90, 155)}, ${r.random(130, 190)}, 255, ${alpha})`;
        disk(g, x, y, r.random(0.38, 1.55));
      }

      for (let i = 0; i < 130; i++) {
        const radius = core * lerp(1.05, 3.0, i / 130);
        g.strokeStyle = `rgba(88, 145, 205, ${0.045 * (1 - i / 130)})`;
        g.lineWidth = 0.7;
        strokeEllipse(g, 0, 0, radius * 1.78, radius * 0.56, 0);
      }

      g.shadowBlur = core * 0.50;
      g.shadowColor = "rgba(255, 199, 152, .75)";
      g.strokeStyle = "rgba(255, 211, 174, .24)";
      g.lineWidth = 1.1;
      strokeEllipse(g, 0, 0, core * 2.62, core * 2.32, 0);
      g.strokeStyle = "rgba(255, 235, 206, .82)";
      g.lineWidth = 1.35;
      arc(g, 0, 0, core * 1.33, core * 1.15, Math.PI * 0.66, Math.PI * 1.97);

      g.shadowBlur = 0;
      g.globalCompositeOperation = "source-over";
      const eventHorizon = g.createRadialGradient(0, 0, 0, 0, 0, core * 1.28);
      eventHorizon.addColorStop(0, "rgba(0, 3, 8, 1)");
      eventHorizon.addColorStop(0.70, "rgba(0, 4, 10, 1)");
      eventHorizon.addColorStop(1, "rgba(0, 4, 11, .94)");
      g.fillStyle = eventHorizon;
      disk(g, 0, 0, core * 1.18);

      g.save();
      g.globalCompositeOperation = "multiply";
      const shadow = g.createRadialGradient(0, 0, core * 0.62, 0, 0, core * 1.56);
      shadow.addColorStop(0, "rgba(0, 0, 0, 1)");
      shadow.addColorStop(0.76, "rgba(0, 0, 0, .96)");
      shadow.addColorStop(1, "rgba(0, 0, 0, 0)");
      g.fillStyle = shadow;
      disk(g, 0, 0, core * 1.58);
      g.restore();

      g.globalCompositeOperation = "screen";
      g.shadowBlur = core * 0.20;
      g.shadowColor = "rgba(255, 204, 158, .85)";
      g.strokeStyle = "rgba(255, 220, 183, .70)";
      g.lineWidth = 1.6;
      arc(g, 0, -core * 0.02, core * 1.24, core * 1.08, Math.PI * 0.55, Math.PI * 2.02);
      g.strokeStyle = "rgba(255, 180, 126, .48)";
      g.lineWidth = 2;
      arc(g, 0, core * 0.03, core * 1.36, core * 0.35, Math.PI * 0.02, Math.PI * 0.96);
      arc(g, 0, core * 0.10, core * 1.36, core * 0.37, Math.PI * 1.04, Math.PI * 1.88);
      g.shadowBlur = 0;

      for (let i = 0; i < 1600; i++) {
        const t = i / 1600;
        const x = lerp(core * 0.52, core * 2.85, t) + r.gaussian(0, core * 0.08);
        const y = Math.sin(t * Math.PI * 1.08) * core * 0.37 + r.gaussian(0, core * 0.05);
        g.fillStyle = `rgba(255, ${r.random(170, 220)}, ${r.random(120, 170)}, ${0.30 * (1 - t)})`;
        disk(g, x, y, r.random(0.35, 1.45));
      }

      g.restore();

      target.save();
      target.globalCompositeOperation = "screen";
      target.drawImage(layer, 0, 0);
      target.restore();

      target.save();
      target.globalCompositeOperation = "source-over";
      target.shadowBlur = core * 0.34;
      target.shadowColor = "rgba(0, 0, 0, 0.95)";
      const horizon = target.createRadialGradient(cx, cy, 0, cx, cy, core * 1.34);
      horizon.addColorStop(0, "rgba(0, 2, 6, 1)");
      horizon.addColorStop(0.70, "rgba(0, 3, 8, 1)");
      horizon.addColorStop(0.92, "rgba(0, 5, 12, 0.96)");
      horizon.addColorStop(1, "rgba(0, 5, 12, 0)");
      target.fillStyle = horizon;
      target.beginPath();
      target.arc(cx, cy, core * 1.28, 0, Math.PI * 2);
      target.fill();
      target.restore();

      target.save();
      target.globalCompositeOperation = "screen";
      target.shadowBlur = core * 0.28;
      target.shadowColor = "rgba(255, 205, 160, 0.75)";
      target.strokeStyle = "rgba(255, 218, 180, 0.56)";
      target.lineWidth = 1.8;
      target.beginPath();
      target.ellipse(cx, cy - core * 0.01, core * 1.33, core * 1.16, 0, Math.PI * 0.56, Math.PI * 2.01);
      target.stroke();
      target.strokeStyle = "rgba(255, 174, 120, 0.42)";
      target.lineWidth = 2.0;
      target.beginPath();
      target.ellipse(cx, cy + core * 0.08, core * 1.44, core * 0.39, 0, Math.PI * 1.02, Math.PI * 1.90);
      target.stroke();
      target.restore();
    }

    function drawFineGrain(target, width, height, r) {
      target.save();
      target.globalCompositeOperation = "overlay";
      for (let i = 0; i < 12000; i++) {
        const alpha = r.random(0.010, 0.035);
        target.fillStyle = r.random() < 0.5 ? `rgba(255,255,255,${alpha})` : `rgba(0,0,0,${alpha})`;
        target.fillRect(r.random(width), r.random(height), 1, 1);
      }
      target.restore();
    }

    function drawVignette(target, width, height) {
      const gradient = target.createRadialGradient(width * 0.55, height * 0.48, width * 0.08, width * 0.55, height * 0.49, width * 0.78);
      gradient.addColorStop(0, "rgba(0, 0, 0, 0)");
      gradient.addColorStop(0.58, "rgba(0, 0, 0, 0.04)");
      gradient.addColorStop(1, "rgba(0, 0, 0, 0.58)");
      target.fillStyle = gradient;
      target.fillRect(0, 0, width, height);
    }

    function disk(target, x, y, radius) {
      target.beginPath();
      target.arc(x, y, radius, 0, Math.PI * 2);
      target.fill();
    }

    function fillEllipse(target, x, y, rx, ry, rotation) {
      target.save();
      target.translate(x, y);
      target.rotate(rotation);
      target.beginPath();
      target.ellipse(0, 0, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI * 2);
      target.fill();
      target.restore();
    }

    function strokeEllipse(target, x, y, rx, ry, rotation) {
      target.save();
      target.translate(x, y);
      target.rotate(rotation);
      target.beginPath();
      target.ellipse(0, 0, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI * 2);
      target.stroke();
      target.restore();
    }

    function arc(target, x, y, rx, ry, start, end) {
      target.save();
      target.translate(x, y);
      target.beginPath();
      target.ellipse(0, 0, Math.abs(rx), Math.abs(ry), 0, start, end);
      target.stroke();
      target.restore();
    }

    function line(target, x1, y1, x2, y2) {
      target.beginPath();
      target.moveTo(x1, y1);
      target.lineTo(x2, y2);
      target.stroke();
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    window.addEventListener("resize", resize);
    resize();
  </script>
</body>
</html>
