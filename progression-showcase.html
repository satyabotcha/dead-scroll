<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zodiac Progression Board</title>
<style>
  :root {
    color-scheme: dark;
  }

  * { box-sizing: border-box; }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #01040b;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  #controls {
    position: fixed;
    top: 14px;
    left: 16px;
    z-index: 2;
    display: grid;
    grid-template-columns: auto minmax(120px, 1fr) auto auto auto;
    align-items: center;
    gap: 10px;
    width: min(360px, calc(100vw - 32px));
    padding: 9px 10px;
    border: 1px solid rgba(220, 230, 255, 0.1);
    border-radius: 8px;
    background: rgba(2, 7, 17, 0.64);
    backdrop-filter: blur(18px);
  }

  #controls label,
  #day-count {
    color: rgba(236, 242, 255, 0.72);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #day-count {
    min-width: 34px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  #day-slider {
    width: 100%;
    accent-color: #f5f9ff;
  }

  #controls button {
    height: 28px;
    padding: 0 10px;
    border: 0;
    border-radius: 5px;
    background: rgba(255, 255, 255, 0.08);
    color: rgba(246, 249, 255, 0.78);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.08em;
    cursor: pointer;
  }

  @media (max-width: 760px) {
    #controls {
      top: 12px;
      left: 14px;
      width: min(250px, calc(100vw - 28px));
      grid-template-columns: auto 1fr auto;
    }

    #controls button {
      display: none;
    }
  }
</style>
</head>

  <label for="day-slider">Day</label>
  <input id="day-slider" type="range" min="0" max="30" value="4">
  <span id="day-count">4</span>
  <button type="button" data-day="15">15</button>
  <button type="button" data-day="30">30</button>

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function ease(value) {
  const x = clamp(value, 0, 1);
  return x * x * (3 - 2 * x);
}

function drawBackdrop(time) {
  const bg = ctx.createLinearGradient(0, 0, width, height);
  bg.addColorStop(0, "#020510");
  bg.addColorStop(0.52, "#040918");
  bg.addColorStop(1, "#00030a");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, width, height);

  const haze = ctx.createRadialGradient(width * 0.5, height * 0.5, 0, width * 0.5, height * 0.5, Math.min(width, height) * 0.72);
  haze.addColorStop(0, "rgba(70, 105, 160, 0.055)");
  haze.addColorStop(1, "rgba(0, 0, 0, 0)");
  ctx.fillStyle = haze;
  ctx.fillRect(0, 0, width, height);

  for (let i = 0; i < dust.length; i += 1) {
    const star = dust[i];
    const twinkle = 0.72 + Math.sin(time * (0.35 + star.r * 0.16) + star.p) * 0.2;
    ctx.beginPath();
    ctx.arc(star.x * width, star.y * height, star.r * ratio, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(226, 236, 255, ${star.a * twinkle})`;
    ctx.fill();
  }
}

function getBoardRect() {
  const boardAspect = GRID_COLS / GRID_ROWS;
  const cssWidth = width / ratio;
  const availableTop = 52 * ratio;
  const availableBottom = 14 * ratio;
  const availableWidth = Math.min(width - 38 * ratio, 340 * ratio);
  const availableHeight = height - availableTop - availableBottom;
  let drawWidth = availableWidth;
  let drawHeight = drawWidth / boardAspect;

  if (drawHeight > availableHeight) {
    drawHeight = availableHeight;
    drawWidth = drawHeight * boardAspect;
  }

  return {
    x: cssWidth < 700 ? 18 * ratio : (width - drawWidth) / 2,
    y: availableTop + Math.max(18 * ratio, (availableHeight - drawHeight) * 0.42),
    w: drawWidth,
    h: drawHeight
  };
}

function withCellClip(renderCtx, rect, cellIndex, draw) {
  const col = cellIndex % GRID_COLS;
  const row = Math.floor(cellIndex / GRID_COLS);
  const cellW = rect.w / GRID_COLS;
  const cellH = rect.h / GRID_ROWS;
  const padX = -cellW * 0.012;
  const padY = -cellH * 0.018;
  const x = rect.x + col * cellW + padX;
  const y = rect.y + row * cellH + padY;
  const w = cellW - padX * 2;
  const h = cellH - padY * 2;

  renderCtx.save();
  renderCtx.beginPath();
  renderCtx.rect(x, y, w, h);
  renderCtx.clip();
  draw({ x, y, w, h, cellW, cellH });
  renderCtx.restore();
}

function pointInCell(cell, point) {
  return {
    x: cell.x + point[0] * cell.w,
    y: cell.y + point[1] * cell.h
  };
}

function cubicAt(path, t) {
  const p0 = path[0];
  const p1 = path[1];
  const p2 = path[2];
  const p3 = path[3];
  const u = 1 - t;
  return [
    u * u * u * p0[0] + 3 * u * u * t * p1[0] + 3 * u * t * t * p2[0] + t * t * t * p3[0],
    u * u * u * p0[1] + 3 * u * u * t * p1[1] + 3 * u * t * t * p2[1] + t * t * t * p3[1]
  ];
}

function drawPartialCurve(renderCtx, cell, path, progress) {
  const steps = 34;
  const first = pointInCell(cell, cubicAt(path, 0));

  renderCtx.beginPath();
  renderCtx.moveTo(first.x, first.y);

  for (let i = 1; i <= steps * progress; i += 1) {
    const p = pointInCell(cell, cubicAt(path, i / steps));
    renderCtx.lineTo(p.x, p.y);
  }

  const exact = pointInCell(cell, cubicAt(path, progress));
  renderCtx.lineTo(exact.x, exact.y);
  renderCtx.stroke();
}

function drawStar(renderCtx, cell, star, time, signIndex) {
  const appear = ease((day - star[2]) / 4);
  if (appear <= 0) return;

  const p = pointInCell(cell, star);
  const pulse = 0.9 + Math.sin(time * 1.25 + signIndex * 0.7 + star[0] * 8) * 0.1;
  const core = cell.w * 0.014 * star[3] * appear * pulse;
  const halo = core * 5.6;

  const glow = renderCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, halo);
  glow.addColorStop(0, `rgba(255, 255, 255, ${0.78 * appear})`);
  glow.addColorStop(0.32, `rgba(255, 255, 255, ${0.28 * appear})`);
  glow.addColorStop(1, "rgba(255, 255, 255, 0)");
  renderCtx.fillStyle = glow;
  renderCtx.beginPath();
  renderCtx.arc(p.x, p.y, halo, 0, Math.PI * 2);
  renderCtx.fill();

  renderCtx.fillStyle = `rgba(255, 255, 255, ${0.94 * appear})`;
  renderCtx.beginPath();
  renderCtx.arc(p.x, p.y, Math.max(0.85 * ratio, core), 0, Math.PI * 2);
  renderCtx.fill();
}

function drawSign(renderCtx, cell, sign, signIndex, time) {
  const lineWidth = Math.max(0.65 * ratio, cell.w * 0.008);

  renderCtx.save();
  renderCtx.lineCap = "round";
  renderCtx.lineJoin = "round";
  renderCtx.shadowColor = "rgba(255, 255, 255, 0.34)";
  renderCtx.shadowBlur = 5 * ratio;
  renderCtx.strokeStyle = "rgba(255, 255, 255, 0.86)";
  renderCtx.lineWidth = lineWidth;

  for (const path of sign.paths) {
    const pathProgress = ease((day - path[4]) / (path[5] - path[4]));
    if (pathProgress <= 0) continue;
    renderCtx.globalAlpha = 0.28 + pathProgress * 0.72;
    drawPartialCurve(renderCtx, cell, path, pathProgress);
  }

  renderCtx.shadowBlur = 0;
  renderCtx.globalAlpha = 1;

  for (const star of sign.stars) {
    drawStar(renderCtx, cell, star, time, signIndex);
  }

  renderCtx.restore();
}

function drawProgression(rect, time) {
  for (let cellIndex = 0; cellIndex < SIGNS.length; cellIndex += 1) {
    withCellClip(ctx, rect, cellIndex, (cell) => {
      drawSign(ctx, cell, SIGNS[cellIndex], cellIndex, time);
    });
  }
}

function render() {
  const time = (performance.now() - startedAt) / 1000;

  drawBackdrop(time);
  drawProgression(getBoardRect(), time);

  requestAnimationFrame(render);
}

addEventListener("resize", resize);
daySlider.addEventListener("input", () => {
  day = Number(daySlider.value);
  dayCount.textContent = String(day);
});

document.querySelectorAll("#controls button").forEach((button) => {
  button.addEventListener("click", () => {
    day = Number(button.dataset.day);
    daySlider.value = String(day);
    dayCount.textContent = String(day);
  });
});

resize();
render();
</script>
</body>
</html>
