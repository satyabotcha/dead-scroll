<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zodiac Progression Prototype</title>
<style>
  :root {
    color-scheme: dark;
    --ink: rgba(245, 248, 255, 0.92);
    --muted: rgba(220, 230, 255, 0.48);
    --panel: rgba(3, 8, 18, 0.68);
    --line: rgba(180, 210, 255, 0.16);
    --gold: #ffd98a;
    --blue: #8cbcff;
  }

  * { box-sizing: border-box; }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #01040b;
    font-family: ui-serif, Georgia, "Times New Roman", serif;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  #hud {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  #title {
    position: fixed;
    top: 24px;
    left: 24px;
    max-width: 360px;
    color: var(--ink);
    text-shadow: 0 0 28px rgba(110, 160, 255, 0.22);
  }

  #title .eyebrow {
    display: block;
    margin-bottom: 8px;
    color: rgba(255, 217, 138, 0.74);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  #sign-name {
    margin: 0;
    font-size: clamp(34px, 6vw, 76px);
    line-height: 0.9;
    font-weight: 500;
    letter-spacing: 0;
  }

  #sign-note {
    margin: 12px 0 0;
    color: var(--muted);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    line-height: 1.45;
  }

  #controls {
    position: fixed;
    top: 24px;
    right: 24px;
    width: min(440px, calc(100vw - 48px));
    pointer-events: auto;
  }

  #signs {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 6px;
    padding: 6px;
    border: 1px solid rgba(180, 210, 255, 0.1);
    border-radius: 8px;
    background: var(--panel);
    backdrop-filter: blur(18px);
  }

  #signs button {
    min-width: 0;
    height: 34px;
    border: 0;
    border-radius: 5px;
    background: transparent;
    color: rgba(229, 237, 255, 0.42);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 180ms ease, color 180ms ease;
  }

  #signs button:hover,
  #signs button.active {
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.92);
  }

  #scrubber {
    display: grid;
    grid-template-columns: auto 1fr 42px;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    padding: 12px 14px;
    border: 1px solid rgba(180, 210, 255, 0.1);
    border-radius: 8px;
    background: var(--panel);
    backdrop-filter: blur(18px);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #scrubber label {
    color: rgba(255, 217, 138, 0.62);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  #day-slider {
    width: 100%;
    accent-color: var(--gold);
  }

  #day-count {
    color: rgba(255, 255, 255, 0.84);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }

  @media (max-width: 760px) {
    #title {
      top: 16px;
      left: 14px;
      max-width: none;
      right: 14px;
    }

    #controls {
      top: auto;
      right: 14px;
      bottom: 14px;
      left: 14px;
      width: auto;
    }

    #signs {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
  }
</style>
</head>

  </div>
  <div id="controls">
    <div id="signs" aria-label="Signs"></div>
    <div id="scrubber">
      <label for="day-slider">Day</label>
      <input id="day-slider" type="range" min="0" max="30" value="4">
      <span id="day-count">4</span>

function seeded(seed) {
  const s = Math.sin(seed * 127.1) * 43758.5453123;
  return s - Math.floor(s);
}

const dust = Array.from({ length: 170 }, (_, i) => ({
  x: seeded(i + 10),
  y: seeded(i + 100),
  r: 0.35 + seeded(i + 200) * 1.2,
  a: 0.05 + seeded(i + 300) * 0.24,
  p: seeded(i + 400) * Math.PI * 2
}));

function resize() {
  ratio = Math.min(window.devicePixelRatio || 1, 1.75);
  width = Math.floor(innerWidth * ratio);
  height = Math.floor(innerHeight * ratio);
  canvas.width = width;
  canvas.height = height;
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function ease(value) {
  const x = clamp(value, 0, 1);
  return x * x * (3 - 2 * x);
}

function scalePoint(point) {
  const side = Math.min(width, height) * 0.86;
  const x0 = width * 0.5 - side * 0.5;
  const y0 = height * 0.52 - side * 0.5;
  return [x0 + point[0] * side, y0 + point[1] * side];
}

function cubic(a, b, c, d, t) {
  const mt = 1 - t;
  return mt * mt * mt * a + 3 * mt * mt * t * b + 3 * mt * t * t * c + t * t * t * d;
}

function drawCubic(stroke, reveal, color, alphaMul, widthMul) {
  if (reveal <= 0) return;

  const [p0, p1, p2, p3] = stroke;
  const [r, g, b] = color;
  const steps = Math.max(8, Math.floor(60 * reveal));

  ctx.beginPath();
  for (let i = 0; i <= steps; i += 1) {
    const t = reveal * (i / steps);
    const x = cubic(p0[0], p1[0], p2[0], p3[0], t);
    const y = cubic(p0[1], p1[1], p2[1], p3[1], t);
    const [sx, sy] = scalePoint([x, y]);
    if (i === 0) ctx.moveTo(sx, sy);
    else ctx.lineTo(sx, sy);
  }

  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alphaMul})`;
  ctx.lineWidth = widthMul * ratio;
  ctx.stroke();
}

function drawSky(time) {
  const bg = ctx.createLinearGradient(0, 0, width, height);
  bg.addColorStop(0, "#030611");
  bg.addColorStop(0.42, "#050b1a");
  bg.addColorStop(0.75, "#020714");
  bg.addColorStop(1, "#00030a");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, width, height);

  const glows = [
    [0.22, 0.35, 0.33, "55, 96, 170", 0.08],
    [0.75, 0.42, 0.38, "185, 92, 140", 0.055],
    [0.50, 0.72, 0.36, "40, 140, 160", 0.052]
  ];

  for (const [gx, gy, gr, rgb, alpha] of glows) {
    const x = width * gx + Math.sin(time * 0.07 + gx * 8) * 18 * ratio;
    const y = height * gy + Math.cos(time * 0.05 + gy * 8) * 16 * ratio;
    const rad = Math.min(width, height) * gr;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, rad);
    grad.addColorStop(0, `rgba(${rgb}, ${alpha})`);
    grad.addColorStop(0.46, `rgba(${rgb}, ${alpha * 0.32})`);
    grad.addColorStop(1, "rgba(0, 0, 0, 0)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);
  }

  for (let i = 0; i < dust.length; i += 1) {
    const star = dust[i];
    const twinkle = 0.72 + Math.sin(time * (0.4 + star.r * 0.16) + star.p) * 0.22;
    ctx.beginPath();
    ctx.arc(star.x * width, star.y * height, star.r * ratio, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(216, 229, 255, ${star.a * twinkle})`;
    ctx.fill();
  }
}

function drawMeteor(time) {
  const cycle = (time % 13) / 13;
  if (cycle > 0.2) return;

  const progress = cycle / 0.2;
  const x0 = width * 0.12;
  const y0 = height * 0.2;
  const len = Math.min(width, height) * 0.22;
  const headX = x0 + len * progress * 1.4;
  const headY = y0 + len * progress * 0.42;
  const tailX = headX - len * 0.42;
  const tailY = headY - len * 0.13;
  const alpha = progress < 0.45 ? progress / 0.45 : (1 - progress) / 0.55;
  const grad = ctx.createLinearGradient(tailX, tailY, headX, headY);
  grad.addColorStop(0, "rgba(255, 255, 255, 0)");
  grad.addColorStop(0.72, `rgba(142, 190, 255, ${alpha * 0.32})`);
  grad.addColorStop(1, `rgba(255, 255, 255, ${alpha * 0.86})`);

  ctx.beginPath();
  ctx.moveTo(tailX, tailY);
  ctx.lineTo(headX, headY);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1.1 * ratio;
  ctx.stroke();
}

function drawSign(time) {
  const sign = signs[activeSign];
  const monthProgress = day / 30;
  const [r, g, b] = sign.hue;

  ctx.save();
  ctx.globalCompositeOperation = "screen";

  for (const stroke of sign.strokes) {
    const reveal = ease((day - stroke[4]) / Math.max(1, stroke[5] - stroke[4]));

    // A dim future trace lets the animal be anticipated without giving away the whole reward.
    drawCubic(stroke, 1, sign.hue, 0.035, stroke[6] * 1.7);

    ctx.shadowBlur = 18 * ratio;
    ctx.shadowColor = `rgba(${r}, ${g}, ${b}, 0.42)`;
    drawCubic(stroke, reveal, sign.hue, 0.16 + reveal * 0.28, stroke[6] * 3.8);

    ctx.shadowBlur = 0;
    drawCubic(stroke, reveal, sign.hue, 0.46 + reveal * 0.36, stroke[6]);

    if (reveal > 0.98) {
      drawCubic(stroke, 1, [255, 255, 255], 0.08, stroke[6] * 0.34);
    }
  }

  sign.anchor.forEach((point, index) => {
    const unlock = index / Math.max(1, sign.anchor.length - 1);
    const appear = ease((monthProgress - unlock * 0.72) / 0.18);
    if (appear <= 0) return;

    const [x, y] = scalePoint(point);
    const pulse = 0.85 + Math.sin(time * 1.2 + index * 1.7) * 0.12;
    const size = (1.35 + seeded(activeSign * 80 + index) * 1.35) * ratio * appear;

    ctx.beginPath();
    ctx.arc(x, y, size * (4.2 + appear * 1.8), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${0.035 * appear})`;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x, y, size * pulse, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 248, 226, ${0.38 + appear * 0.52})`;
    ctx.fill();
  });

  if (day >= 30) {
    const halo = ctx.createRadialGradient(width * 0.5, height * 0.52, 0, width * 0.5, height * 0.52, Math.min(width, height) * 0.38);
    const breathe = 0.035 + Math.sin(time * 0.7) * 0.015;
    halo.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${breathe})`);
    halo.addColorStop(1, "rgba(0, 0, 0, 0)");
    ctx.fillStyle = halo;
    ctx.fillRect(0, 0, width, height);
  }

  ctx.restore();
}

function render() {
  const time = (performance.now() - startedAt) / 1000;
  drawSky(time);
  drawSign(time);
  drawMeteor(time);
  requestAnimationFrame(render);
}

function setSign(index) {
  activeSign = index;
  const sign = signs[index];
  signName.textContent = sign.name;
  signNote.textContent = sign.note;
  [...signButtons.children].forEach((button, buttonIndex) => {
    button.classList.toggle("active", buttonIndex === index);
  });
}

signs.forEach((sign, index) => {
  const button = document.createElement("button");
  button.type = "button";
  button.textContent = sign.name.slice(0, 3);
  button.title = sign.name;
  button.addEventListener("click", () => setSign(index));
  signButtons.append(button);
});

daySlider.addEventListener("input", () => {
  day = Number(daySlider.value);
  dayCount.textContent = String(day);
});

addEventListener("resize", resize);
resize();
setSign(0);
render();
</script>
</body>
</html>
