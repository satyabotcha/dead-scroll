<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zodiac Progression Board</title>
<style>
  :root {
    color-scheme: dark;
    --ink: rgba(246, 249, 255, 0.94);
    --soft: rgba(220, 230, 255, 0.56);
  }

  * { box-sizing: border-box; }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #01040b;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  #controls {
    position: fixed;
    top: 14px;
    left: 16px;
    z-index: 2;
    display: grid;
    grid-template-columns: auto minmax(120px, 420px) auto auto auto;
    align-items: center;
    gap: 10px;
    width: min(360px, calc(100vw - 32px));
    padding: 9px 10px;
    border: 1px solid rgba(220, 230, 255, 0.1);
    border-radius: 8px;
    background: rgba(2, 7, 17, 0.64);
    backdrop-filter: blur(18px);
  }

  #controls label,
  #day-count {
    color: rgba(236, 242, 255, 0.72);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #day-count {
    min-width: 34px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  #day-slider {
    width: 100%;
    accent-color: #f5f9ff;
  }

  #controls button {
    height: 28px;
    padding: 0 10px;
    border: 0;
    border-radius: 5px;
    background: rgba(255, 255, 255, 0.08);
    color: rgba(246, 249, 255, 0.78);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.08em;
    cursor: pointer;
  }

  @media (max-width: 760px) {
    #controls {
      top: 12px;
      left: 14px;
      width: min(250px, calc(100vw - 28px));
      grid-template-columns: auto 1fr auto;
    }

    #controls button {
      display: none;
    }
  }
</style>
</head>

  <input id="day-slider" type="range" min="0" max="30" value="4">
  <span id="day-count">4</span>
  <button type="button" data-day="15">15</button>
  <button type="button" data-day="30">30</button>

function seeded(seed) {
  const s = Math.sin(seed * 127.1) * 43758.5453123;
  return s - Math.floor(s);
}

const dust = Array.from({ length: 210 }, (_, i) => ({
  x: seeded(i + 10),
  y: seeded(i + 100),
  r: 0.25 + seeded(i + 200) * 0.9,
  a: 0.035 + seeded(i + 300) * 0.18,
  p: seeded(i + 400) * Math.PI * 2
}));

function resize() {
  ratio = Math.min(window.devicePixelRatio || 1, 1.75);
  width = Math.floor(innerWidth * ratio);
  height = Math.floor(innerHeight * ratio);
  canvas.width = width;
  canvas.height = height;
}

function cubic(a, b, c, d, t) {
  const mt = 1 - t;
  return mt * mt * mt * a + 3 * mt * mt * t * b + 3 * mt * t * t * c + t * t * t * d;
}

function drawSky(time) {
  const bg = ctx.createLinearGradient(0, 0, width, height);
  bg.addColorStop(0, "#030610");
  bg.addColorStop(0.46, "#050a18");
  bg.addColorStop(1, "#00030a");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, width, height);

  const haze = ctx.createRadialGradient(width * 0.5, height * 0.54, 0, width * 0.5, height * 0.54, Math.min(width, height) * 0.72);
  haze.addColorStop(0, "rgba(70, 105, 160, 0.055)");
  haze.addColorStop(1, "rgba(0, 0, 0, 0)");
  ctx.fillStyle = haze;
  ctx.fillRect(0, 0, width, height);

  for (let i = 0; i < dust.length; i += 1) {
    const star = dust[i];
    const twinkle = 0.72 + Math.sin(time * (0.35 + star.r * 0.16) + star.p) * 0.2;
    ctx.beginPath();
    ctx.arc(star.x * width, star.y * height, star.r * ratio, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(226, 236, 255, ${star.a * twinkle})`;
    ctx.fill();
  }
}

function getBoardLayout() {
  const cssWidth = width / ratio;
  const headerSpace = (cssWidth < 760 ? 58 : 54) * ratio;
  const marginX = (cssWidth < 760 ? 18 : 34) * ratio;
  const marginBottom = (cssWidth < 760 ? 60 : 66) * ratio;
  const boardY = headerSpace;
  const boardW = Math.min(width - marginX * 2, 360 * ratio);
  const boardH = height - boardY - marginBottom;

  const cols = 4;

  const rows = Math.ceil(signs.length / cols);
  return {
    cols,
    rows,
    boardX: marginX,
    boardY,
    cellW: boardW / cols,
    cellH: Math.min(boardH / rows, 112 * ratio)
  };
}

function pointInCell(point, cell) {
  const pad = Math.min(cell.w, cell.h) * 0.1;
  const size = Math.min(cell.w - pad * 2, cell.h - pad * 2);
  const x0 = cell.x + cell.w * 0.5 - size * 0.5;
  const y0 = cell.y + cell.h * 0.52 - size * 0.5;
  return [x0 + point[0] * size, y0 + point[1] * size];
}

function ease(value) {
  const x = Math.min(1, Math.max(0, value));
  return x * x * (3 - 2 * x);
}

function drawCurve(stroke, cell, reveal, alpha, widthMul) {
  if (reveal <= 0) return;

  const [p0, p1, p2, p3] = stroke;
  const [r, g, b] = WHITE;
  const steps = Math.max(8, Math.floor(56 * reveal));

  ctx.beginPath();
  for (let i = 0; i <= steps; i += 1) {
    const t = reveal * (i / steps);
    const x = cubic(p0[0], p1[0], p2[0], p3[0], t);
    const y = cubic(p0[1], p1[1], p2[1], p3[1], t);
    const [sx, sy] = pointInCell([x, y], cell);
    if (i === 0) ctx.moveTo(sx, sy);
    else ctx.lineTo(sx, sy);
  }

  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
  ctx.lineWidth = Math.max(0.55 * ratio, widthMul * ratio);
  ctx.stroke();
}

function strokeReveal(strokeIndex, strokeCount) {
  const start = (strokeIndex / Math.max(1, strokeCount)) * 20;
  const end = start + 8 + (strokeIndex % 3) * 1.6;
  return ease((day - start) / (end - start));
}

function anchorReveal(anchorIndex, anchorCount) {
  const start = (anchorIndex / Math.max(1, anchorCount - 1)) * 21;
  return ease((day - start) / 6.5);
}

function drawSign(sign, index, layout, time) {
  const col = index % layout.cols;
  const row = Math.floor(index / layout.cols);
  const cell = {
    x: layout.boardX + col * layout.cellW,
    y: layout.boardY + row * layout.cellH,
    w: layout.cellW,
    h: layout.cellH
  };

  ctx.save();
  ctx.globalCompositeOperation = "screen";

  sign.strokes.forEach((stroke, strokeIndex) => {
    const reveal = strokeReveal(strokeIndex, sign.strokes.length);

    // Keep a barely visible destination trace so the month feels like discovery, not a sudden drawing.
    drawCurve(stroke, cell, 1, 0.028, stroke[4] * 0.55);

    ctx.shadowBlur = 7 * ratio;
    ctx.shadowColor = "rgba(245, 249, 255, 0.26)";
    drawCurve(stroke, cell, reveal, 0.12 + reveal * 0.08, stroke[4] * 1.2);
    ctx.shadowBlur = 0;
    drawCurve(stroke, cell, reveal, 0.22 + reveal * 0.48, stroke[4] * 0.54);
    drawCurve(stroke, cell, reveal, 0.14 + reveal * 0.12, stroke[4] * 0.2);
  });

  sign.anchors.forEach((point, anchorIndex) => {
    const reveal = anchorReveal(anchorIndex, sign.anchors.length);
    if (reveal <= 0) return;

    const [x, y] = pointInCell(point, cell);
    const pulse = 0.86 + Math.sin(time * 1.2 + index * 0.8 + anchorIndex) * 0.08;
    const starSize = (0.55 + seeded(index * 80 + anchorIndex) * 0.54) * ratio * reveal;

    ctx.beginPath();
    ctx.arc(x, y, starSize * 3.6, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(245, 249, 255, ${0.026 * reveal})`;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x, y, starSize * pulse, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${0.18 + reveal * 0.7})`;
    ctx.fill();
  });

  ctx.restore();
}

function drawBoard(time) {
  const layout = getBoardLayout();

  signs.forEach((sign, index) => {
    drawSign(sign, index, layout, time);
  });
}

function render() {
  const time = (performance.now() - startedAt) / 1000;
  drawSky(time);
  drawBoard(time);
  requestAnimationFrame(render);
}

addEventListener("resize", resize);
daySlider.addEventListener("input", () => {
  day = Number(daySlider.value);
  dayCount.textContent = String(day);
});

document.querySelectorAll("#controls button").forEach((button) => {
  button.addEventListener("click", () => {
    day = Number(button.dataset.day);
    daySlider.value = String(day);
    dayCount.textContent = String(day);
  });
});

resize();
render();
</script>
