<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zodiac Progression Board</title>
<style>
  :root {
    color-scheme: dark;
  }

  * { box-sizing: border-box; }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #01040b;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  #controls {
    position: fixed;
    top: 14px;
    left: 16px;
    z-index: 2;
    display: grid;
    grid-template-columns: auto minmax(120px, 1fr) auto auto auto;
    align-items: center;
    gap: 10px;
    width: min(360px, calc(100vw - 32px));
    padding: 9px 10px;
    border: 1px solid rgba(220, 230, 255, 0.1);
    border-radius: 8px;
    background: rgba(2, 7, 17, 0.64);
    backdrop-filter: blur(18px);
  }

  #controls label,
  #day-count {
    color: rgba(236, 242, 255, 0.72);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #day-count {
    min-width: 34px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  #day-slider {
    width: 100%;
    accent-color: #f5f9ff;
  }

  #controls button {
    height: 28px;
    padding: 0 10px;
    border: 0;
    border-radius: 5px;
    background: rgba(255, 255, 255, 0.08);
    color: rgba(246, 249, 255, 0.78);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.08em;
    cursor: pointer;
  }

  @media (max-width: 760px) {
    #controls {
      top: 12px;
      left: 14px;
      width: min(250px, calc(100vw - 28px));
      grid-template-columns: auto 1fr auto;
    }

    #controls button {
      display: none;
    }
  }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div id="controls">
  <label for="day-slider">Day</label>
  <input id="day-slider" type="range" min="0" max="30" value="4">
  <span id="day-count">4</span>
  <button type="button" data-day="15">15</button>
  <button type="button" data-day="30">30</button>
</div>

<script>
"use strict";

const TARGET_IMAGE_SRC = "prototype-assets/zodiac-target-board.png";
const GRID_COLS = 4;
const GRID_ROWS = 3;
const CANVAS_MAX_DEVICE_PIXEL_RATIO = 1.75;

const canvas = document.getElementById("sky");
const ctx = canvas.getContext("2d");
const daySlider = document.getElementById("day-slider");
const dayCount = document.getElementById("day-count");
const targetImage = new Image();

let width = 0;
let height = 0;
let ratio = 1;
let day = Number(daySlider.value);
let startedAt = performance.now();
let targetLoaded = false;

targetImage.src = TARGET_IMAGE_SRC;
targetImage.addEventListener("load", () => {
  targetLoaded = true;
});

function resize() {
  ratio = Math.min(window.devicePixelRatio || 1, CANVAS_MAX_DEVICE_PIXEL_RATIO);
  width = Math.floor(innerWidth * ratio);
  height = Math.floor(innerHeight * ratio);
  canvas.width = width;
  canvas.height = height;
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function ease(value) {
  const x = clamp(value, 0, 1);
  return x * x * (3 - 2 * x);
}

function seeded(seed) {
  const s = Math.sin(seed * 127.1) * 43758.5453123;
  return s - Math.floor(s);
}

const dust = Array.from({ length: 180 }, (_, i) => ({
  x: seeded(i + 10),
  y: seeded(i + 100),
  r: 0.22 + seeded(i + 200) * 0.72,
  a: 0.025 + seeded(i + 300) * 0.14,
  p: seeded(i + 400) * Math.PI * 2
}));

function drawBackdrop(time) {
  const bg = ctx.createLinearGradient(0, 0, width, height);
  bg.addColorStop(0, "#020510");
  bg.addColorStop(0.52, "#040918");
  bg.addColorStop(1, "#00030a");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, width, height);

  const haze = ctx.createRadialGradient(width * 0.5, height * 0.5, 0, width * 0.5, height * 0.5, Math.min(width, height) * 0.72);
  haze.addColorStop(0, "rgba(70, 105, 160, 0.055)");
  haze.addColorStop(1, "rgba(0, 0, 0, 0)");
  ctx.fillStyle = haze;
  ctx.fillRect(0, 0, width, height);

  for (let i = 0; i < dust.length; i += 1) {
    const star = dust[i];
    const twinkle = 0.72 + Math.sin(time * (0.35 + star.r * 0.16) + star.p) * 0.2;
    ctx.beginPath();
    ctx.arc(star.x * width, star.y * height, star.r * ratio, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(226, 236, 255, ${star.a * twinkle})`;
    ctx.fill();
  }
}

function getTargetRect() {
  const imageAspect = targetImage.naturalWidth / targetImage.naturalHeight;
  const cssWidth = width / ratio;
  const availableTop = 52 * ratio;
  const availableBottom = 14 * ratio;
  const availableWidth = Math.min(width - 38 * ratio, 300 * ratio);
  const availableHeight = height - availableTop - availableBottom;
  let drawWidth = availableWidth;
  let drawHeight = drawWidth / imageAspect;

  if (drawHeight > availableHeight) {
    drawHeight = availableHeight;
    drawWidth = drawHeight * imageAspect;
  }

  return {
    x: cssWidth < 700 ? 18 * ratio : (width - drawWidth) / 2,
    y: availableTop + Math.max(18 * ratio, (availableHeight - drawHeight) * 0.42),
    w: drawWidth,
    h: drawHeight
  };
}

function drawTargetImage(rect, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.drawImage(targetImage, rect.x, rect.y, rect.w, rect.h);
  ctx.restore();
}

function withCellClip(renderCtx, rect, cellIndex, draw) {
  const col = cellIndex % GRID_COLS;
  const row = Math.floor(cellIndex / GRID_COLS);
  const cellW = rect.w / GRID_COLS;
  const cellH = rect.h / GRID_ROWS;
  const padX = -cellW * 0.012;
  const padY = -cellH * 0.018;
  const x = rect.x + col * cellW + padX;
  const y = rect.y + row * cellH + padY;
  const w = cellW - padX * 2;
  const h = cellH - padY * 2;

  renderCtx.save();
  renderCtx.beginPath();
  renderCtx.rect(x, y, w, h);
  renderCtx.clip();
  draw({ x, y, w, h, cellW, cellH });
  renderCtx.restore();
}

function drawRevealMask(renderCtx, cell, cellIndex, progress, time) {
  const anchors = 3 + (cellIndex % 4);
  const sweep = ease((progress - 0.12) / 0.76);

  renderCtx.fillStyle = "rgba(255, 255, 255, 0.18)";
  renderCtx.fillRect(cell.x, cell.y, cell.w * sweep, cell.h);

  for (let i = 0; i < anchors; i += 1) {
    const appear = ease((progress - i * 0.09) / 0.34);
    if (appear <= 0) continue;

    const ax = cell.x + (0.18 + seeded(cellIndex * 21 + i) * 0.64) * cell.w;
    const ay = cell.y + (0.18 + seeded(cellIndex * 27 + i) * 0.64) * cell.h;
    const pulse = 0.92 + Math.sin(time * 0.9 + cellIndex + i) * 0.08;
    const radius = (cell.w * (0.13 + i * 0.028)) * appear * pulse;

    const glow = renderCtx.createRadialGradient(ax, ay, 0, ax, ay, radius);
    glow.addColorStop(0, "rgba(255, 255, 255, 1)");
    glow.addColorStop(0.42, "rgba(255, 255, 255, 0.62)");
    glow.addColorStop(1, "rgba(255, 255, 255, 0)");
    renderCtx.fillStyle = glow;
    renderCtx.beginPath();
    renderCtx.arc(ax, ay, radius, 0, Math.PI * 2);
    renderCtx.fill();
  }

  if (progress > 0.72) {
    renderCtx.fillStyle = `rgba(255, 255, 255, ${(progress - 0.72) / 0.28})`;
    renderCtx.fillRect(cell.x, cell.y, cell.w, cell.h);
  }
}

function drawProgression(rect, time) {
  const progress = day / 30;

  if (progress >= 0.995) {
    drawTargetImage(rect, 1);
    return;
  }

  // The target image is the source of truth; this faint pass keeps the final composition visible while progress is low.
  drawTargetImage(rect, 0.1 + progress * 0.05);

  const mask = document.createElement("canvas");
  mask.width = width;
  mask.height = height;
  const maskCtx = mask.getContext("2d");

  if (!maskCtx) {
    return;
  }

  for (let cellIndex = 0; cellIndex < GRID_COLS * GRID_ROWS; cellIndex += 1) {
    const localProgress = ease((progress + 0.1 - cellIndex * 0.006) / 0.78);
    withCellClip(maskCtx, rect, cellIndex, (cell) => drawRevealMask(maskCtx, cell, cellIndex, localProgress, time));
  }

  ctx.save();
  ctx.drawImage(targetImage, rect.x, rect.y, rect.w, rect.h);
  ctx.globalCompositeOperation = "destination-in";
  ctx.drawImage(mask, 0, 0);
  ctx.restore();
}

function render() {
  const time = (performance.now() - startedAt) / 1000;

  drawBackdrop(time);

  if (targetLoaded) {
    const rect = getTargetRect();
    drawProgression(rect, time);
  }

  requestAnimationFrame(render);
}

addEventListener("resize", resize);
daySlider.addEventListener("input", () => {
  day = Number(daySlider.value);
  dayCount.textContent = String(day);
});

document.querySelectorAll("#controls button").forEach((button) => {
  button.addEventListener("click", () => {
    day = Number(button.dataset.day);
    daySlider.value = String(day);
    dayCount.textContent = String(day);
  });
});

resize();
render();
</script>
</body>
</html>
